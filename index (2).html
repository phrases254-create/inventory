:12px 8px;border-top:1px solid rgba(255,255,255,.06);}.user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.05);}.user-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}.user-info .user-name{color:#fff;font-size:13px;font-weight:600;}.user-info .user-role{font-size:11px;color:rgba(255,255,255,.4);}.btn-logout{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:14px;transition:color .2s;}.btn-logout:hover{color:var(--danger);}.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;}.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow);}.page-title{font-size:18px;font-weight:700;color:var(--text);}.page-subtitle{font-size:12px;color:var(--text-muted);margin-top:2px;}.topbar-actions{display:flex;align-items:center;gap:10px;}.content{padding:24px;flex:1;}.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);}.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.card-title{font-size:15px;font-weight:700;}.card-body{padding:20px;}.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}.stat-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;transition:transform .15s,box-shadow .15s;}.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}.stat-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}.stat-valu eight:500;}.search-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;flex:1;max-width:320px;}.search-bar input{border:none;background:none;font-family:inherit;font-size:13px;color:var(--text);flex:1;}.search-bar input:focus{outline:none;}.search-bar i{color:var(--text-muted);}.section{display:none;}.section.active{display:block;}.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;}.tab{padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}.tab:hover{color:var(--primary);}.tab.active{color:var(--primary);border-bottom-color:var(--primary);}.progress-wrap{background:var(--bg);border-radius:4px;height:6px;overflow:hidden;}.progress-bar{height:100%;border-radius:4px;transition:width .5s;}.chart-placeholder{height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);background:var(--bg);border-radius:8px;gap:8px;}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}.alert-banner{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:10px;margin-bottom:12px;}.alert-warning{background:#fef3c7;border:1px solid #fcd34d;}.alert-danger{background:#fee2e2;border:1px solid #fca5a5;}.alert-info{background:#dbeafe;border:1px solid #93c5fd;}.av-blue{background:var(--primary);}.av-green{background:var(--secondary);}.av-red{background:var(--danger);}.av-purple{background:var(--purple);}.av-orange{background:var(--warning);}.timeline{position:relative;padding-left:28px;}.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border);}.timeline-item{position:relative;margin-bottom:18px;}.timeline-dot{position:absolute;left:-24px;top:2px;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px var(--border);}.timeline-content{font-size:13px;}.timeline-title{font-weight:600;}.timeline-time{font-size:11px;color:var(--text-muted);margin-top:2px;}.config-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);}.config-item:last-child{border-bottom:none;}.config-label{font-size:14px;font-weight:600;}.config-desc{font-size:12px;color:var(--text-muted);margin-top:2px;}.toggle{width:44px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}.toggle.on{background:var(--primary);}.toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}.toggle.on::after{left:23px;}@media (max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr);}.grid-2,.grid-3{grid-template-columns:1fr;}.form-grid,.form-grid-3{grid-template-columns:1fr;}}</style>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxGGxQEKmaG1YHhzD-oTTQcZM4aivI9Y-MZV2qh5oIDDowwBmnljGZY59OgSzaPzaDZwQ/exec';

function loadData(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}
function saveData(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {
    if(e.name === 'QuotaExceededError') {
      Swal.fire({icon:'warning',title:'พื้นที่จัดเก็บเต็ม',text:'localStorage เต็ม รูปโปรไฟล์อาจใหญ่เกินไป ลองลดขนาดรูป',confirmButtonColor:'#1a56db'});
    }
  }
}

function seedIfEmpty(key, def) {
  if(localStorage.getItem(key) === null) { saveData(key, def); return JSON.parse(JSON.stringify(def)); }
  try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return JSON.parse(JSON.stringify(def)); }
}

const DEFAULT_USERS = [
  { id: 'U001', username: 'admin', password: 'admin123', name: 'ผู้ดูแลระบบ', role: 'admin', dept: 'IT', avatar: 'av-blue', profileImg: '' },
];

let USERS = loadData('inv_users', null);
if (!USERS || USERS.length === 0) {

  USERS = JSON.parse(JSON.stringify(DEFAULT_USERS));
  saveData('inv_users', USERS);
} else {

  USERS = USERS.map(u => ({ profileImg: '', ...u }));

  if (!USERS.find(u => u.id === 'U001')) {
    USERS.unshift(DEFAULT_USERS[0]);
  }
  saveData('inv_users', USERS);
}

function reloadUsers() { USERS = loadData('inv_users', DEFAULT_USERS); }

let EQUIPMENT = seedIfEmpty('inv_equipment', []);

let SOFTWARE = seedIfEmpty('inv_software', []);

let BORROWS = seedIfEmpty('inv_borrows', []);

let REPAIRS = seedIfEmpty('inv_repairs', []);

let EMPLOYEES = seedIfEmpty('inv_employees', []);

let CATEGORIES = seedIfEmpty('inv_categories', ['คอมพิวเตอร์','โน้ตบุ๊ก','เครื่องพิมพ์','จอภาพ','อุปกรณ์เครือข่าย','อุปกรณ์ต่อพ่วง','แท็บเล็ต','อื่นๆ']);
let LOCATIONS  = seedIfEmpty('inv_locations',  ['ห้อง IT ชั้น 2','แผนกบัญชี','แผนก HR','แผนกการตลาด','แผนกขาย','ห้องประชุม A','ห้องประชุม B','โกดัง']);
let DEPTS      = seedIfEmpty('inv_depts',      ['IT','บัญชี','การตลาด','HR','ขาย','ฝ่ายผลิต','จัดซื้อ','ฝ่ายบริหาร']);

let currentUser = null;

function _parseUser(su, localUsers) {

  const allKeys = Object.keys(su);

  const idKey = allKeys.find(k => k.toLowerCase() === 'id') || 'ID';
  const userId = su[idKey] || su['ID'] || su.id || '';

  const userKey = allKeys.find(k => k.toLowerCase() === 'username') || 'Username';
  const username = su[userKey] || su['Username'] || su.username || '';

  const passKey = allKeys.find(k =>
    k.toLowerCase() === 'password' ||
    k === 'Password' ||
    k === 'password' ||
    k === 'รหัสผ่าน'
  ) || '';
  const sheetsPass = passKey ? (String(su[passKey] || '').trim()) : '';

  const local = localUsers.find(x =>
    x.id === userId ||
    x.username === username
  );
  const localPass = local ? (local.password || '') : '';

  const finalPass = sheetsPass || localPass || '';

  return {
    id:         userId,
    username:   username,
    name:       su['ชื่อ']   || su.name   || username,
    role:       su['Role']   || su.role   || 'user',
    dept:       su['แผนก']   || su.dept   || '',
    avatar:     su['Avatar'] || su.avatar || 'av-blue',
    password:   finalPass,
    profileImg: local ? (local.profileImg || '') : '',
  };
}

function _mergeUsersFromSheets(sheetsUsers) {
  const localUsers = loadData('inv_users', DEFAULT_USERS);
  const merged = sheetsUsers.map(su => _parseUser(su, localUsers));

  DEFAULT_USERS.forEach(def => {
    const idx = merged.findIndex(x => x.id === def.id || x.username === def.username);
    if (idx === -1) {
      merged.unshift(def); // ไม่มีใน Sheets → เพิ่มเลย
    } else {

      if (!merged[idx].password) {
        const localUser = localUsers.find(x => x.id === def.id);
        merged[idx].password = (localUser && localUser.password) ? localUser.password : def.password;
      }
    }
  });

  USERS = merged;
  saveData('inv_users', USERS);
}

function doLogin() {
  const u = (document.getElementById('loginUser').value || '').trim();
  const p = (document.getElementById('loginPass').value || '').trim();
  if (!u || !p) {
    Swal.fire({ icon:'warning', title:'กรุณากรอกข้อมูล', text:'กรุณากรอก Username และรหัสผ่าน', confirmButtonColor:'var(--primary)' });
    return;
  }

  function doActualLogin(userList) {

    const finalList = [...userList];
    DEFAULT_USERS.forEach(def => {
      if (!finalList.find(x => x.id === def.id)) finalList.unshift(def);
    });

    const found = finalList.find(x => x.username === u && x.password === p);
    if (!found) {
      Swal.fire({ icon:'error', title:'เข้าสู่ระบบไม่สำเร็จ', text:'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', confirmButtonColor:'var(--primary)' });
      return;
    }
    currentUser = found;
    USERS = finalList;
    saveData('inv_users', finalList);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    initApp();
  }

  function mergeUsersFromResponse(res) {
    const localUsers = loadData('inv_users', DEFAULT_USERS);
    if (!res || !res.success || !res.data || !res.data.users || !res.data.users.length) {
      return localUsers;
    }
    const merged = [...localUsers];
    res.data.users.forEach(su => {
      const keys = Object.keys(su);
      const get = (...ns) => {
        for (const n of ns) {
          const k = keys.find(k => k.toLowerCase() === n.toLowerCase());
          if (k && su[k] !== undefined && su[k] !== null && String(su[k]).trim()) return String(su[k]).trim();
        }
        return '';
      };
      const sid   = get('id');
      const susr  = get('username');
      const spass = get('password', 'รหัสผ่าน');
      if (!sid && !susr) return;

      const idx = merged.findIndex(x => x.id === sid || x.username === susr);
      if (idx >= 0) {
        merged[idx] = {
          ...merged[idx],
          name:     get('ชื่อ', 'name')   || merged[idx].name,
          role:     get('role')            || merged[idx].role,
          dept:     get('แผนก', 'dept')   || merged[idx].dept,
          avatar:   get('avatar')          || merged[idx].avatar || 'av-blue',
          password: spass || merged[idx].password,
        };
      } else if (spass) {
        merged.push({
          id: sid, username: susr,
          name:       get('ชื่อ', 'name') || susr,
          role:       get('role')          || 'user',
          dept:       get('แผนก', 'dept') || '',
          avatar:     get('avatar')        || 'av-blue',
          password:   spass,
          profileImg: '',
        });
      }
    });
    return merged;
  }

  function syncMainDataFromResponse(res) {
    if (!res || !res.success || !res.data) return;
    const d = res.data;
    if (d.equipment && d.equipment.length > 0) {
      EQUIPMENT = d.equipment.map(r => ({
        id: r['ID'], code: r['รหัสพัสดุ'], name: r['ชื่ออุปกรณ์'],
        category: r['หมวดหมู่'], brand: r['ยี่ห้อ'], model: r['รุ่น'],
        serial: r['Serial'], status: r['สถานะ'], location: r['สถานที่'],
        holder: r['ผู้ถือครอง'], price: r['ราคา'], purchaseDate: r['วันที่ซื้อ'],
        warrantyEnd: r['หมดประกัน'], note: r['หมายเหตุ'],
      }));
      saveData('inv_equipment', EQUIPMENT);
    }
    if (d.software && d.software.length > 0) {
      SOFTWARE = d.software.map(r => ({
        id: r['ID'], name: r['ชื่อซอฟต์แวร์'], version: r['Version'],
        licenseKey: r['License Key'], type: r['ประเภท'], seats: r['Seats'],
        usedSeats: r['ใช้งาน'], vendor: r['Vendor'], price: r['ราคา'],
        expireDate: r['วันหมดอายุ'], note: r['หมายเหตุ'],
      }));
      saveData('inv_software', SOFTWARE);
    }
    if (d.borrows && d.borrows.length > 0) {
      BORROWS = d.borrows.map(r => ({
        id: r['ID'], equipmentId: r['รหัสอุปกรณ์'], equipmentName: r['ชื่ออุปกรณ์'],
        requestByName: r['ผู้ขอ'], requestDate: r['วันที่ขอ'],
        borrowDate: r['วันที่ยืม'], returnDate: r['กำหนดคืน'],
        purpose: r['วัตถุประสงค์'], status: r['สถานะ'], approvedBy: r['ผู้อนุมัติ'],
        note: r['หมายเหตุ'],
      }));
      saveData('inv_borrows', BORROWS);
    }
    if (d.repairs && d.repairs.length > 0) {
      REPAIRS = d.repairs.map(r => ({
        id: r['ID'], equipmentId: r['รหัสอุปกรณ์'], equipmentName: r['ชื่ออุปกรณ์'],
        reportByName: r['ผู้แจ้ง'], reportDate: r['วันที่แจ้ง'],
        problem: r['ปัญหา'], status: r['สถานะ'], technician: r['ช่าง'],
        cost: r['ค่าใช้จ่าย'], note: r['หมายเหตุ'], log: [],
      }));
      saveData('inv_repairs', REPAIRS);
    }
    if (d.employees && d.employees.length > 0) {
      EMPLOYEES = d.employees.map(r => ({
        id: r['ID'], empCode: r['รหัสพนักงาน'], name: r['ชื่อ'],
        dept: r['แผนก'], position: r['ตำแหน่ง'],
        email: r['Email'], phone: r['เบอร์โทร'], userId: '',
      }));
      saveData('inv_employees', EMPLOYEES);
    }
    if (d.categories && d.categories.length > 0) { CATEGORIES = d.categories; saveData('inv_categories', CATEGORIES); }
    if (d.locations  && d.locations.length > 0)  { LOCATIONS  = d.locations;  saveData('inv_locations',  LOCATIONS);  }
    if (d.depts      && d.depts.length > 0)      { DEPTS      = d.depts;      saveData('inv_depts',      DEPTS);      }
  }

  // Login จาก local ก่อนเสมอ — ทำงานได้ทั้งเปิดไฟล์ HTML และผ่าน Apps Script URL
  doActualLogin(loadData('inv_users', DEFAULT_USERS));

  // sync ข้อมูลจาก Sheets ในพื้นหลัง (หลัง login สำเร็จแล้ว)
  if (API_URL && API_URL !== 'xxx') {
    fetch(API_URL + '?action=getData', { method: 'GET' })
      .then(r => r.json())
      .then(res => {
        syncMainDataFromResponse(res);
        const merged = mergeUsersFromResponse(res);
        saveData('inv_users', merged);
      })
      .catch(() => console.warn('Sheets sync failed, using local data'));
  }
}

    if (callback) callback();

  fetch(API_URL + '?action=getData', { method: 'GET' })

            usedSeats: r['ใช้งาน'], vendor: r['Vendor'], price: r['ราคา'],
            expireDate: r['วันหมดอายุ'], note: r['หมายเหตุ'],
          }));
          saveData('inv_software', SOFTWARE);
        }

        if (d.borrows && d.borrows.length > 0) {
          BORROWS = d.borrows.map(r => ({
            id: r['ID'], equipmentId: r['รหัสอุปกรณ์'], equipmentName: r['ชื่ออุปกรณ์'],
            requestByName: r['ผู้ขอ'], requestDate: r['วันที่ขอ'],
            borrowDate: r['วันที่ยืม'], returnDate: r['กำหนดคืน'],
            purpose: r['วัตถุประสงค์'], status: r['สถานะ'], approvedBy: r['ผู้อนุมัติ'],
            note: r['หมายเหตุ'],
          }));
          saveData('inv_borrows', BORROWS);
        }

        if (d.repairs && d.repairs.length > 0) {
          REPAIRS = d.repairs.map(r => ({
            id: r['ID'], equipmentId: r['รหัสอุปกรณ์'], equipmentName: r['ชื่ออุปกรณ์'],
            reportByName: r['ผู้แจ้ง'], reportDate: r['วันที่แจ้ง'],

            cost: r['ค่าใช้จ่าย'], note: r['หมายเหตุ'], log: [],
          }));
          saveData('inv_repairs', REPAIRS);
        }

        if (d.employees && d.employees.length > 0) {
          EMPLOYEES = d.employees.map(r => ({
            id: r['ID'], empCode: r['รหัสพนักงาน'], name: r['ชื่อ'],
            dept: r['แผนก'], position: r['ตำแหน่ง'],
            email: r['Email'], phone: r['เบอร์โทร'], userId: '',
          }));

        }

        if (d.categories && d.categories.length > 0) { CATEGORIES = d.categories; saveData('inv_categories', CATEGORIES); }
        if (d.locations  && d.locations.length > 0)  { LOCATIONS  = d.locations;  saveData('inv_locations',  LOCATIONS);  }
        if (d.depts      && d.depts.length > 0)      { DEPTS      = d.depts;      saveData('inv_depts',      DEPTS);      }

        if (d.users && d.users.length > 0) {
          _mergeUsersFromSheets(d.users);
        }

        Swal.fire({ icon:'success', title:'ซิงก์ข้อมูลสำเร็จ', text:'ข้อมูลเป็นปัจจุบันจาก Google Sheets', showConfirmButton:false, timer:1500, toast:true, position:'top-end' });
      }
      if (callback) callback();
    })
    .catch(err => {
      hideLoading();
      console.warn('ไม่สามารถดึงข้อมูลจาก Sheets ได้ ใช้ข้อมูลในเครื่องแทน:', err);
      if (callback) callback();
    });
}

function getBadgeCount(id) {
  if (id === 'borrowBadge') return BORROWS.filter(b => b.status === 'pending').length;
  if (id === 'repairBadge') return REPAIRS.filter(r => r.status === 'pending').length;
  return 0;
}

function buildNav() {
  const groups = NAV[currentUser.role] || NAV.user;
  let html = '';
  groups.forEach(g => {
    html += `<div class="nav-section-label">${g.label}</div>`;
    g.items.forEach(item => {
      const cnt = item.badge ? getBadgeCount(item.badge) : 0;
      const badgeHtml = cnt > 0 ? `<span class="nav-badge">${cnt}</span>` : '';
      html += `<div class="nav-item" id="nav-${item.id}" onclick="navigate('${item.id}')">
        <i class="fas ${item.icon} nav-icon"></i>
        <span class="nav-label">${item.label}</span>${badgeHtml}

    });
  });

}

function renderDashboard() {
  const activeEq = EQUIPMENT.filter(e=>e.status==='active').length;
  const repairEq = EQUIPMENT.filter(e=>e.status==='repair').length;

  const borrowing = BORROWS.filter(b=>b.status==='borrowing').length;

      </div>
      <div class="stat-card">

      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fef3c7;color:var(--warning)"><i class="fas fa-hand-holding"></i></div>

function saveEquipment(id) {
  const code = $('#f_code').val().trim();
  const name = $('#f_name').val().trim();
  if(!code || !name) { Swal.fire({icon:'warning',title:'กรุณากรอกข้อมูลที่จำเป็น',text:'รหัสพัสดุและชื่ออุปกรณ์ต้องไม่ว่าง',confirmButtonColor:'#1a56db'}); return; }

  const obj = {
    code, name,
    category: $('#f_cat').val(),
    brand: $('#f_brand').val(),
    model: $('#f_model').val(),
    serial: $('#f_serial').val(),
    status: $('#f_status').val(),
    location: $('#f_loc').val(),
    holder: $('#f_holder').val(),
    price: $('#f_price').val(),
    purchaseDate: $('#f_pdate').val(),
    warrantyEnd: $('#f_warr').val(),
    note: $('#f_note').val(),
    savedBy: currentUser.name,
    savedAt: new Date().toISOString()
  };

  if(id) {
    const idx = EQUIPMENT.findIndex(e=>e.id===id);
    obj.id = id;
    EQUIPMENT[idx] = obj;
  } else {
    obj.id = 'EQ'+(Date.now());
    EQUIPMENT.push(obj);
  }
  saveData('inv_equipment', EQUIPMENT);
  sendToSheets('equipment', obj);
  closeModal();
  renderEquipment();
}

function deleteEquipment(id) {
  Swal.fire({ title:'ลบอุปกรณ์นี้?', text:'ข้อมูลจะถูกลบออกจากระบบ', icon:'warning', showCancelButton:true, confirmButtonText:'ลบ', cancelButtonText:'ยกเลิก', confirmButtonColor:'#e02424' })
    .then(r => {
      if(r.isConfirmed) {
        EQUIPMENT = EQUIPMENT.filter(e=>e.id!==id);
        saveData('inv_equipment',EQUIPMENT);
        sendToSheetsSilent('deleteEquipment', { id });
        renderEquipment();
        Swal.fire({icon:'success',title:'ลบสำเร็จ',showConfirmButton:false,timer:1500});
      }
    });
}

function renderSoftware() {
  const isAdmin = ['admin','staff'].includes(currentUser.role);
  const typeLabel = { single:'Single', volume:'Volume', subscription:'Subscription' };
  let rows = SOFTWARE.map(s => {
    const exp = s.expireDate ? new Date(s.expireDate) : null;
    const today = new Date();
    const near = exp && (exp-today)/(1000*60*60*24) < 90;
    const expired = exp && exp < today;
    const expBadge = expired ? '<span class="badge badge-red">หมดอายุ</span>' : near ? '<span class="badge badge-yellow">ใกล้หมด</span>' : '<span class="badge badge-green">ปกติ</span>';
    return `<tr>
      <td><b>${s.name}</b></td>
      <td>${s.version||'-'}</td>
      <td><span class="badge badge-blue">${typeLabel[s.type]||s.type}</span></td>
      <td>${s.seats||'-'}</td>
      <td>${s.usedSeats||0}</td>
      <td>${s.expireDate||'ถาวร'}</td>
      <td>${expBadge}</td>
      <td>
        ${isAdmin ? `<button class="btn btn-sm btn-primary" onclick="editSoftware('${s.id}')"><i class="fas fa-edit"></i></button>
        <button class="btn btn-sm btn-danger" onclick="deleteSoftware('${s.id}')" style="margin-left:4px"><i class="fas fa-trash"></i></button>` : ''}
      </td>
    </tr>`;
  }).join('');

  $('#mainContent').html(`
    <div class="card">
      <div class="card-header">
        <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="swSearch" placeholder="ค้นหาซอฟต์แวร์..." oninput="filterTable('swSearch','swBody')"></div>

  const reader = new FileReader();
  reader.onload = function(e) {
    const b64 = e.target.result;
    $('#uf_profile_img').val(b64);

function saveUser(id) {
  const name     = $('#uf_name').val().trim();
  const username = $('#uf_user').val().trim();
  const pass     = $('#uf_pass').val().trim();
  const role     = $('#uf_role').val();
  const dept     = $('#uf_dept').val();
  const avatar   = $('#uf_av').val();
  const profileImg = $('#uf_profile_img').val();

  if(!name || !username) { Swal.fire({icon:'warning',title:'กรุณากรอกชื่อและ Username',confirmButtonColor:'var(--primary)'}); return; }
  if(!id && !pass) { Swal.fire({icon:'warning',title:'กรุณากรอกรหัสผ่าน',confirmButtonColor:'var(--primary)'}); return; }
  if(id && pass && pass.length < 4) { Swal.fire({icon:'warning',title:'รหัสผ่านสั้นเกินไป',text:'รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร',confirmButtonColor:'var(--primary)'}); return; }

  USERS = loadData('inv_users', DEFAULT_USERS);

  const dup = USERS.find(u => u.username===username && u.id!==id);
  if(dup) { Swal.fire({icon:'warning',title:'Username นี้มีในระบบแล้ว',confirmButtonColor:'var(--primary)'}); return; }

  if(id) {
    const idx = USERS.findIndex(u=>u.id===id);
    if(idx === -1) { Swal.fire({icon:'error',title:'ไม่พบผู้ใช้',confirmButtonColor:'var(--primary)'}); return; }

    USERS[idx].name     = name;
    USERS[idx].username = username;
    USERS[idx].role     = role;
    USERS[idx].dept     = dept;
    USERS[idx].avatar   = avatar;
    if(profileImg !== '') USERS[idx].profileImg = profileImg;

    if(pass) {
      USERS[idx].password = pass;

      if(currentUser && currentUser.id === id) {
        currentUser.password = pass;
      }
    }
    if(currentUser && currentUser.id === id) {
      currentUser.name = name; currentUser.username = username;
      currentUser.role = role; currentUser.dept = dept; currentUser.avatar = avatar;
      if(profileImg !== '') currentUser.profileImg = profileImg;
      updateSidebarUser();
    }
  } else {
    USERS.push({ id:'U'+Date.now(), username, password:pass, name, role, dept, avatar, profileImg:profileImg||'' });
  }

  saveData('inv_users', USERS);

  closeModal();
  renderUsers();
  Swal.fire({icon:'success', title:'บันทึกสำเร็จ', text: pass ? 'บันทึกข้อมูลและรหัสผ่านแล้ว' : 'บันทึกข้อมูลแล้ว', showConfirmButton:false, timer:1800});

  const userForSheets = id ? USERS.find(u=>u.id===id) : USERS[USERS.length-1];
  if (userForSheets && userForSheets.password) {
    sendToSheetsSilent('user', {
      id:         userForSheets.id,
      username:   userForSheets.username,
      name:       userForSheets.name,
      role:       userForSheets.role,
      dept:       userForSheets.dept || '',
      avatar:     userForSheets.avatar || 'av-blue',
      password:   userForSheets.password,  // ส่ง password เสมอเพื่อให้เครื่องอื่น login ได้
    });
  }
}

function deleteUser(id) {
  if(id==='U001') { Swal.fire({icon:'warning',title:'ไม่สามารถลบ Admin หลักได้'}); return; }
  Swal.fire({title:'ลบผู้ใช้นี้?',icon:'warning',showCancelButton:true,confirmButtonText:'ลบ',cancelButtonText:'ยกเลิก',confirmButtonColor:'#e02424'})
    .then(r=>{if(r.isConfirmed){
      reloadUsers();
      const deletedUser = USERS.find(u=>u.id===id);
      USERS = USERS.filter(u=>u.id!==id);
      saveData('inv_users',USERS);

      if (deletedUser) {
        sendToSheetsSilent('deleteUser', { id: deletedUser.id, username: deletedUser.username });
      }
      renderUsers();
    }});
}

function addMaster(type, inputId) {
  const val = $(`#${inputId}`).val().trim();
  if(!val) return;
  const stores = { categories: [CATEGORIES,'inv_categories'], locations: [LOCATIONS,'inv_locations'], depts: [DEPTS,'inv_depts'] };
  const [arr, key] = stores[type];
  if(arr.includes(val)){Swal.fire({icon:'warning',title:'มีข้อมูลนี้แล้ว',confirmButtonColor:'#1a56db'});return;}
  arr.push(val); saveData(key, arr); renderMasterData();
}

function deleteMaster(type, idx) {
  const stores = { categories: [CATEGORIES,'inv_categories'], locations: [LOCATIONS,'inv_locations'], depts: [DEPTS,'inv_depts'] };
  const [arr, key] = stores[type];
  arr.splice(idx, 1); saveData(key, arr); renderMasterData();
}

function exportReport(type) {
  let data, headers, filename;
  if(type==='equipment'){
    headers=['รหัสพัสดุ','ชื่ออุปกรณ์','หมวดหมู่','ยี่ห้อ','รุ่น','Serial','สถานะ','สถานที่','ผู้ถือครอง','วันหมดประกัน','ราคา'];
    data=EQUIPMENT.map(e=>[e.code,e.name,e.category,e.brand,e.model,e.serial,e.status,e.location,e.holder,e.warrantyEnd,e.price]);
    filename='equipment_report';
  } else if(type==='software'){
    headers=['ชื่อซอฟต์แวร์','Version','ประเภท','License Key','Seats','ใช้งาน','วันหมดอายุ','Vendor','ราคา'];
    data=SOFTWARE.map(s=>[s.name,s.version,s.type,s.licenseKey,s.seats,s.usedSeats,s.expireDate,s.vendor,s.price]);
    filename='software_report';
  } else if(type==='borrows'){
    headers=['รหัส','ผู้ยืม','อุปกรณ์','วันที่ขอ','กำหนดคืน','วัตถุประสงค์','สถานะ','ผู้อนุมัติ'];
    data=BORROWS.map(b=>[b.id,b.requestByName,b.equipmentName,b.requestDate,b.returnDate,b.purpose,b.status,b.approvedBy]);
    filename='borrow_report';
  } else {
    headers=['รหัส','ผู้แจ้ง','อุปกรณ์','วันที่แจ้ง','ปัญหา','ช่าง','สถานะ','ค่าใช้จ่าย'];
    data=REPAIRS.map(r=>[r.id,r.reportByName,r.equipmentName,r.reportDate,r.problem,r.technician,r.status,r.cost]);
    filename='repair_report';
  }
  let csv = [headers].concat(data).map(r=>r.map(v=>'"'+(v||'').toString().replace(/"/g,'""')+'"').join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename+'_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  URL.revokeObjectURL(url);
  Swal.fire({icon:'success',title:'Export สำเร็จ',showConfirmButton:false,timer:1500});
}

function saveSettings(){Swal.fire({icon:'success',title:'บันทึกการตั้งค่าสำเร็จ',showConfirmButton:false,timer:1500});}

function exportAllData() {
  const data = {
    exportedAt: new Date().toISOString(),
    exportedBy: currentUser.name,
    version: '1.0',
    equipment:  loadData('inv_equipment',  []),
    software:   loadData('inv_software',   []),
    borrows:    loadData('inv_borrows',    []),
    repairs:    loadData('inv_repairs',    []),
    employees:  loadData('inv_employees',  []),
    categories: loadData('inv_categories', []),
    locations:  loadData('inv_locations',  []),
    depts:      loadData('inv_depts',      []),
    users:      loadData('inv_users',      []).map(u => ({ ...u, password: '***' })), // ซ่อน password
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0, 10);
  const a    = Object.assign(document.createElement('a'), { href: url, download: `inventory_backup_${date}.json` });
  a.click();
  URL.revokeObjectURL(url);
  Swal.fire({ icon:'success', title:'Export สำเร็จ', text:'ส่งไฟล์ inventory_backup_' + date + '.json ให้เครื่องอื่น แล้วกด Import', confirmButtonColor:'var(--primary)' });
}

function importAllData(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);

      if (!data.version || !data.exportedAt) {
        Swal.fire({ icon:'error', title:'ไฟล์ไม่ถูกต้อง', text:'กรุณาเลือกไฟล์ที่ Export จากระบบนี้เท่านั้น', confirmButtonColor:'var(--primary)' });
        return;
      }

      const date = new Date(data.exportedAt).toLocaleString('th-TH');
      Swal.fire({
        icon: 'warning',
        title: 'ยืนยันการ Import?',
        html: `ข้อมูลเดิมในเครื่องนี้จะถูก<b>แทนที่ทั้งหมด</b><br>
               <span style="font-size:12px;color:var(--text-muted)">Export จากเครื่อง: ${data.exportedBy || 'ไม่ระบุ'}<br>วันที่: ${date}</span>`,
        showCancelButton: true,
        confirmButtonText: 'Import เลย',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#e02424',
      }).then(r => {
        if (!r.isConfirmed) return;

        if (data.equipment)  saveData('inv_equipment',  data.equipment);
        if (data.software)   saveData('inv_software',   data.software);
        if (data.borrows)    saveData('inv_borrows',    data.borrows);
        if (data.repairs)    saveData('inv_repairs',    data.repairs);
        if (data.employees)  saveData('inv_employees',  data.employees);
        if (data.categories) saveData('inv_categories', data.categories);
        if (data.locations)  saveData('inv_locations',  data.locations);
        if (data.depts)      saveData('inv_depts',      data.depts);

        if (data.users) {
          const existingUsers = loadData('inv_users', []);
          const mergedUsers = data.users.map(importedU => {
            const existing = existingUsers.find(u => u.id === importedU.id);
            return { ...importedU, password: existing ? existing.password : 'changeme123', profileImg: importedU.profileImg || '' };
          });
          saveData('inv_users', mergedUsers);
        }

        Swal.fire({ icon:'success', title:'Import สำเร็จ!', text:'โหลดข้อมูลใหม่ทันที...', showConfirmButton:false, timer:1500 })
          .then(() => location.reload());
      });
    } catch(err) {
      Swal.fire({ icon:'error', title:'ไฟล์เสียหาย', text:'ไม่สามารถอ่านไฟล์ได้ กรุณาตรวจสอบไฟล์อีกครั้ง', confirmButtonColor:'var(--primary)' });
    }
  };
  reader.readAsText(file, 'UTF-8');
  input.value = ''; // reset เผื่อ import ไฟล์เดิมซ้ำ
}

function clearAllData(){
  Swal.fire({title:'ล้างข้อมูลทั้งหมด?',text:'ข้อมูลทั้งหมดในระบบจะถูกลบ',icon:'warning',showCancelButton:true,confirmButtonText:'ล้างข้อมูล',cancelButtonText:'ยกเลิก',confirmButtonColor:'#e02424'})
    .then(r=>{if(r.isConfirmed){['inv_equipment','inv_software','inv_borrows','inv_repairs','inv_employees','inv_categories','inv_locations','inv_depts'].forEach(k=>localStorage.removeItem(k));location.reload();}});
}

    </div>
    <div class="card">
      <div class="card-header"><span class="card-title"><i class="fas fa-hand-holding"></i> อุปกรณ์ที่กำลังยืม</span></div>
      <div class="card-body" style="padding:0">
        <div class="table-wrap"><table>
          <thead><tr><th>รหัสยืม</th><th>อุปกรณ์</th><th>วันที่ยืม</th><th>กำหนดคืน</th><th>จัดการ</th></tr></thead>
          <tbody>${brRows||'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted)">ไม่มีอุปกรณ์ที่ยืมอยู่</td></tr>'}</tbody>
        </table></div>
      </div>
    </div>
  `);
}

function filterTable(searchId, bodyId) {
  const q = $(`#${searchId}`).val().toLowerCase();
  $(`#${bodyId} tr`).each(function(){ $(this).toggle($(this).text().toLowerCase().includes(q)); });
}

function openModal(title, body, buttons=[]) {
  $('#modalTitle').text(title);
  $('#modalBody').html(body);
  const btns = buttons.map(b=>`<button class="btn ${b.class}" onclick="${b.action}">${b.label}</button>`).join('');
  $('#modalFooter').html(btns);
  $('#modalOverlay').addClass('open');
}
function closeModal() { $('#modalOverlay').removeClass('open'); }
function closeModalOnOverlay(e) { if(e.target === document.getElementById('modalOverlay')) closeModal(); }

function sendToSheets(type, data) {
  if(!API_URL || API_URL === 'xxx') { console.log('[Demo] API_URL not set. Data:', type, data); return; }
  showLoading('กำลังบันทึกข้อมูลไป Google Sheets...');
  const payload = { type, data, timestamp: new Date().toISOString(), sentBy: currentUser ? currentUser.name : 'system' };
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  })
  .then(r => r.text())
  .then(res => {
    hideLoading();
    Swal.fire({ icon:'success', title:'บันทึกสำเร็จ', text:'ข้อมูลถูกส่งไปยัง Google Sheets แล้ว', showConfirmButton:false, timer:2000, toast:true, position:'top-end' });
  })
  .catch(err => {
    hideLoading();
    console.error('API Error:', err);
    Swal.fire({ icon:'warning', title:'บันทึกในเครื่องสำเร็จ', text:'ไม่สามารถส่งข้อมูลไป Google Sheets ได้ (ตรวจสอบ API URL)', confirmButtonColor:'#1a56db' });
  });
}

function sendToSheetsSilent(type, data) {
  if(!API_URL || API_URL === 'xxx') return;
  const payload = { type, data, timestamp: new Date().toISOString(), sentBy: currentUser ? currentUser.name : 'system' };
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  })
  .then(r => r.text())
  .then(() => {
    Swal.fire({ icon:'success', title:'ซิงก์ข้อมูลสำเร็จ', text:'ข้อมูลผู้ใช้ถูกส่งไปยัง Google Sheets แล้ว', showConfirmButton:false, timer:1500, toast:true, position:'top-end' });
  })
  .catch(err => console.warn('sendToSheetsSilent error:', err));
}


// ── Event Listeners สำหรับ Apps Script CSP ──
document.addEventListener('DOMContentLoaded', function() {
  // ปุ่ม Login
  var btnLogin = document.getElementById('btnLogin');
  if (btnLogin) btnLogin.addEventListener('click', doLogin);

  // Enter ใน password field
  var passInput = document.getElementById('loginPassInput') || document.getElementById('loginPass');
  if (passInput) passInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
});

// ผูก event หลัง login สำเร็จ
function bindPostLoginEvents() {
  var btnLogout = document.getElementById('btnLogout');
  if (btnLogout) btnLogout.addEventListener('click', function(e) {
    e.stopPropagation();
    doLogout();
  });

  var btnSync = document.getElementById('btnSync');
  if (btnSync) btnSync.addEventListener('click', manualSync);

  var userCard = document.getElementById('sidebarUserCard');
  if (userCard) userCard.addEventListener('click', openMyProfile);
}

function showLoading(msg='กำลังดำเนินการ...') { $('#loadingText').text(msg); $('#loadingOverlay').addClass('show'); }
function hideLoading() { $('#loadingOverlay').removeClass('show'); }
</script>
